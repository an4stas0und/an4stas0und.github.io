<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picnolepsia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      background: #000;
      font-family: 'Courier New', monospace;
      padding-bottom: 60px;
    }
 
    #waveform {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
 
    #tracklist {
      position: relative;
      z-index: 1;
    }
 
    .track {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #111;
      padding: 0 20px;
      height: 52px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.08s;
      user-select: none;
      background: transparent;
    }
    .track:first-child { border-top: 1px solid #111; }
    .track:hover { background: rgba(255,255,255,0.02); }
    .track.playing { background: rgba(255,255,255,0.03); }
 
    .track-title {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.06em;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track.playing .track-title { color: #e8e8e0; }
 
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 1px;
      background: #222;
      width: 0%;
    }
    .track.playing .progress-bar { background: #444; }
 
    .indicator {
      position: absolute;
      right: 20px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: transparent;
    }
    .track.playing .indicator {
      background: #e8e8e0;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
 
    /* HUD inferior — botones */
    #btn-picno,
    #btn-stop {
      position: fixed;
      bottom: 0;
      width: 60px;
      height: 60px;
      background: #000;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.08s;
      z-index: 2;
    }
 
    #btn-picno {
      left: 0;
      border-right: 1px solid #111;
      border-top: 1px solid #111;
    }
    #btn-stop {
      right: 0;
      border-left: 1px solid #111;
      border-top: 1px solid #111;
    }
 
    #btn-picno:hover,
    #btn-stop:hover { background: #0d0d0d; }
 
    #btn-picno:active,
    #btn-stop:active { background: #1a1a1a; }
 
    #btn-stop svg rect { fill: #444; transition: fill 0.08s; }
    #btn-stop:hover svg rect { fill: #e8e8e0; }
 
    /* ícono del botón picnolepsia: tres líneas verticales irregulares */
    #btn-picno svg line { stroke: #444; transition: stroke 0.08s; }
    #btn-picno:hover svg line { stroke: #e8e8e0; }
 
    /* parpadeo del body durante la ausencia */
    body.absence {
      animation: blackout 1s steps(1, end);
    }
    @keyframes blackout {
      0%   { opacity: 1; }
      10%  { opacity: 0; }
      90%  { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
 
<canvas id="waveform" aria-hidden="true"></canvas>
 
<div id="tracklist" role="list" aria-label="Picnolepsia">
 
  <div class="track" data-src="audio/01_ausencia.ogg" role="listitem" tabindex="0">

    <span class="indicator"></span>
    <div class="progress-bar"></div>
  </div>
  <div class="track" data-src="audio/02.ogg" role="listitem" tabindex="0">
    <span class="track-title">RIFF$@__WAVEfmt _________î___¸_____data_@__Ü</span>
    <span class="indicator"></span>
    <div class="progress-bar"></div>
  </div>
  <div class="track" data-src="audio/03.ogg" role="listitem" tabindex="0">
    <span class="track-title">WAVEfmt _________î___¸_____data_@__Ü</span>
    <span class="indicator"></span>
    <div class="progress-bar"></div>
  </div>
  <div class="track" data-src="audio/04_sueno_paradojico.ogg" role="listitem" tabindex="0">
    <span class="track-title">Sueño paradójico</span>
    <span class="indicator"></span>
    <div class="progress-bar"></div>
  </div>
  <div class="track" data-src="audio/05.ogg" role="listitem" tabindex="0">
    <span class="track-title">_________î___¸_____data_@__Ü</span>
    <span class="indicator"></span>
    <div class="progress-bar"></div>
  </div>
  <div class="track" data-src="audio/06_sueno_profundo.ogg" role="listitem" tabindex="0">
    <span class="track-title">Sueño profundo</span>
    <span class="indicator"></span>
    <div class="progress-bar"></div>
  </div>
  <div class="track" data-src="audio/07.ogg" role="listitem" tabindex="0">
    <span class="track-title">___¸_____data_@__Ü</span>
    <span class="indicator"></span>
    <div class="progress-bar"></div>
  </div>
  <div class="track" data-src="audio/08_vigilia_paradojica.ogg" role="listitem" tabindex="0">
    <span class="track-title">Vigilia paradójica</span>
    <span class="indicator"></span>
    <div class="progress-bar"></div>
  </div>
  <div class="track" data-src="audio/09_ensueno.ogg" role="listitem" tabindex="0">
    <span class="track-title">Ensueño</span>
    <span class="indicator"></span>
    <div class="progress-bar"></div>
  </div>
  <div class="track" data-src="audio/10.ogg" role="listitem" tabindex="0">
    <span class="track-title">_@__Ü</span>

  <div class="track" data-src="audio/11_0c.ogg" role="listitem" tabindex="0">

  <div class="track" data-src="audio/12_000.ogg" role="listitem" tabindex="0">

  <div class="track" data-src="audio/14_cultra.ogg" role="listitem" tabindex="0">

    <span class="indicator"></span>
    <div class="progress-bar"></div>
  </div>
 
</div>
 
<!-- botón picnolepsia: tres líneas verticales como corte -->
<button id="btn-picno" aria-label="Picnolepsia">
  <svg width="14" height="14" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
    <line x1="2"  y1="1" x2="2"  y2="13" stroke-width="1.5"/>
    <line x1="7"  y1="3" x2="7"  y2="11" stroke-width="1.5"/>
    <line x1="12" y1="0" x2="12" y2="14" stroke-width="1.5"/>
  </svg>
</button>
 
<!-- botón stop -->
<button id="btn-stop" aria-label="Detener todo">
  <svg width="14" height="14" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="14" height="14"/>
  </svg>
</button>
 
<script>
(function () {
  const VOLUME = 0.708;
  const MAX_SIMULTANEOUS = 3;
  const queue = [];
  const allTracks = Array.from(document.querySelectorAll('.track'));
 
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.85;
  analyser.connect(audioCtx.destination);
 
  /* mapa track → audio (para poder acceder por índice en picnolepsia) */
  const audioMap = new Map();
 
  function stopEntry(entry) {
    try { entry.audio.pause(); entry.audio.currentTime = 0; } catch(e) {}
    entry.track.classList.remove('playing');
    entry.track.querySelector('.progress-bar').style.width = '0%';
  }
 
  function removeFromQueue(audio) {
    const idx = queue.findIndex(e => e.audio === audio);
    if (idx !== -1) queue.splice(idx, 1);
  }
 
  function playTrack(track, seekTo) {
    /* seekTo: fracción 0–1 del punto de inicio (opcional) */
    const entry = audioMap.get(track);
    if (!entry) return;
    const { audio } = entry;
 
    if (queue.length >= MAX_SIMULTANEOUS) {
      const oldest = queue.shift();
      stopEntry(oldest);
    }
 
    if (audioCtx.state === 'suspended') audioCtx.resume();
    entry.connectToGraph();
 
    /* saltar al punto aleatorio si se especifica */
    if (seekTo !== undefined && audio.duration) {
      audio.currentTime = seekTo * audio.duration;
    }
 
    track.classList.add('playing');
    audio.play().catch(() => {});
    queue.push({ audio, track });
  }
 
  allTracks.forEach(track => {
    const audio = new Audio(track.getAttribute('data-src'));
    audio.volume = VOLUME;
    /* precargar metadatos para conocer la duración */
    audio.preload = 'metadata';
 
    let connected = false;
    function connectToGraph() {
      if (connected) return;
      connected = true;
      const src = audioCtx.createMediaElementSource(audio);
      src.connect(analyser);
    }
 
    const bar = track.querySelector('.progress-bar');
 
    audio.addEventListener('timeupdate', () => {
      if (audio.duration)
        bar.style.width = ((audio.currentTime / audio.duration) * 100).toFixed(1) + '%';
    });
 
    audio.addEventListener('ended', () => {
      track.classList.remove('playing');
      bar.style.width = '0%';
      removeFromQueue(audio);
    });
 
    const entryObj = { audio, track, connectToGraph };
    audioMap.set(track, entryObj);
 
    function activate() {
      if (track.classList.contains('playing')) {
        audio.pause();
        audio.currentTime = 0;
        track.classList.remove('playing');
        bar.style.width = '0%';
        removeFromQueue(audio);
        return;
      }
      if (queue.length >= MAX_SIMULTANEOUS) {
        const oldest = queue.shift();
        stopEntry(oldest);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      connectToGraph();
      track.classList.add('playing');
      audio.play().catch(() => {});
      queue.push({ audio, track });
    }
 
    track.addEventListener('click', activate);
    track.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); }
    });
  });
 
  /* ── Botón STOP ── */
  document.getElementById('btn-stop').addEventListener('click', () => {
    [...queue].forEach(entry => stopEntry(entry));
    queue.length = 0;
  });
 
  /* ── Botón PICNOLEPSIA ── */
  let picnoLocked = false;
 
  document.getElementById('btn-picno').addEventListener('click', () => {
    if (picnoLocked) return;
    picnoLocked = true;
 
    /* 1. Detener todo lo que suena */
    [...queue].forEach(entry => stopEntry(entry));
    queue.length = 0;
 
    /* 2. Ausencia: pantalla en negro 1 segundo */
    document.body.classList.add('absence');
 
    /* 3. Al cabo de 1 segundo: elegir 3 pistas aleatorias y reproducirlas
          desde un punto aleatorio dentro de su duración */
    setTimeout(() => {
      document.body.classList.remove('absence');
 
      /* mezclar índices y tomar los primeros 3 */
      const shuffled = [...allTracks]
        .map(t => ({ t, r: Math.random() }))
        .sort((a, b) => a.r - b.r)
        .map(x => x.t)
        .slice(0, 3);
 
      shuffled.forEach(track => {
        const { audio } = audioMap.get(track);
        const seekFraction = Math.random(); // punto aleatorio 0–1
 
        /* si la duración ya se conoce, saltamos directo;
           si no, esperamos el evento loadedmetadata */
        function doPlay() {
          playTrack(track, seekFraction);
        }
 
        if (audio.duration) {
          doPlay();
        } else {
          audio.addEventListener('loadedmetadata', doPlay, { once: true });
          /* forzar carga si no había empezado */
          if (audio.readyState === 0) audio.load();
        }
      });
 
      picnoLocked = false;
    }, 1000);
  });
 
  /* ── Visualizador de onda real como fondo ── */
  const canvas  = document.getElementById('waveform');
  const ctx     = canvas.getContext('2d');
  const bufLen  = analyser.frequencyBinCount;
  const dataArr = new Uint8Array(bufLen);
 
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
 
  function drawWave() {
    requestAnimationFrame(drawWave);
    analyser.getByteTimeDomainData(dataArr);
 
    const W = canvas.width;
    const H = canvas.height;
 
    ctx.clearRect(0, 0, W, H);
    ctx.lineWidth   = 1;
    ctx.strokeStyle = 'rgba(80, 80, 74, 0.9)';
    ctx.beginPath();
 
    const sliceW = W / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = dataArr[i] / 128.0;
      const y = (v * H) / 2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      x += sliceW;
    }
    ctx.stroke();
  }
 
  drawWave();
 
})();
</script>
 
</body>
</html>
