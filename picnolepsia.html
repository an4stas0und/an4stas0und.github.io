<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picnolepsia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      background: #000;
      font-family: 'Courier New', monospace;
      padding-bottom: 60px;
    }
 
    #waveform {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
 
    #tracklist {
      position: relative;
      z-index: 1;
      padding-top: 52px;
    }
 
    .track {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #111;
      padding: 0 20px;
      height: 52px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.08s;
      user-select: none;
      background: transparent;
    }
    .track:first-child { border-top: 1px solid #111; }
    .track:hover { background: rgba(255,255,255,0.02); }
    .track.playing { background: rgba(255,255,255,0.03); }
 
    .track-title {
      font-size: 13px;
      color: #aaa;
      letter-spacing: 0.06em;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track.playing .track-title { color: #F0F0EB; }
 
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 1px;
      background: #222;
      width: 0%;
    }
    .track.playing .progress-bar { background: #444; }
 
    .indicator {
      position: absolute;
      right: 20px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: transparent;
    }
    .track.playing .indicator {
      background: #e8e8e0;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
 
    /* ── Botones flotantes — escritorio ── */
    #btn-picno,
    #btn-stop {
      position: fixed;
      bottom: 170px;
      width: 90px;
      height: 90px;
      background: #000;
      border: 1px solid #222;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.08s, box-shadow 0.08s;
      z-index: 2;
      box-shadow: 1px 1px 18px 0px rgba(255, 255, 255, 0.25);
    }
 
    #btn-picno { left: 200px; }
    #btn-stop  { right: 200px; }
 
    #btn-picno:hover,
    #btn-stop:hover {
      background: #0d0d0d;
      box-shadow: 1px 1px 24px 0px rgba(255, 255, 255, 0.32);
    }
 
    #btn-picno:active,
    #btn-stop:active { background: #1a1a1a; }
 
    #btn-stop svg rect { fill: #777; transition: fill 0.08s; }
    #btn-stop:hover svg rect { fill: #e8e8e0; }
 
    #btn-picno svg line { stroke: #777; transition: stroke 0.08s; }
    #btn-picno:hover svg line { stroke: #e8e8e0; }
 
    /* ── font-size mayor solo en escritorio ── */
    @media (min-width: 1025px) {
      .track-title { font-size: 14px; }
    }
 
    /* ── Responsive: móviles ── */
    @media (max-width: 1024px) {
      #btn-picno,
      #btn-stop {
        bottom: 120px;
        width: 90px;
        height: 90px;
      }
      #btn-picno { left: 50px; }
      #btn-stop  { right: 50px; }
    }
 
    /* ausencia picnoléptica: oculta todo menos el canvas */
    body.absence #tracklist,
    body.absence #btn-picno,
    body.absence #btn-stop {
      animation: blackout 1s steps(1, end) forwards;
    }
    @keyframes blackout {
      0%   { opacity: 1; }
      10%  { opacity: 0; }
      90%  { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

<!-- botón picnolepsia: tres líneas verticales como corte -->
<button id="btn-picno" aria-label="Picnolepsia">
  <svg width="36" height="36" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
    <line x1="2"  y1="1" x2="2"  y2="13" stroke-width="1.5"/>
    <line x1="7"  y1="3" x2="7"  y2="11" stroke-width="1.5"/>
    <line x1="12" y1="0" x2="12" y2="14" stroke-width="1.5"/>
  </svg>
</button>
 
<!-- botón stop -->
<button id="btn-stop" aria-label="Detener todo">
  <svg width="36" height="36" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="14" height="14"/>
  </svg>
</button>
 
<script>
(function () {
  const VOLUME = 0.708;
  const MAX_SIMULTANEOUS = 3;
  const queue = [];
  const allTracks = Array.from(document.querySelectorAll('.track'));
 
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.85;
 
  /* ── Limitador a −0.5dB ── */
  const limiter = audioCtx.createDynamicsCompressor();
  limiter.threshold.value = -0.5;  // umbral en −0.5dB
  limiter.knee.value      = 0;     // sin curva suave — corte limpio
  limiter.ratio.value     = 20;    // 20:1 ≈ limitador duro
  limiter.attack.value    = 0.001; // 1ms — reacción casi instantánea
  limiter.release.value   = 0.1;   // 100ms de recuperación
 
  analyser.connect(limiter);
  limiter.connect(audioCtx.destination);
 
  /* mapa track → audio (para poder acceder por índice en picnolepsia) */
  const audioMap = new Map();
 
  function stopEntry(entry) {
    try { entry.audio.pause(); entry.audio.currentTime = 0; } catch(e) {}
    entry.track.classList.remove('playing');
    entry.track.querySelector('.progress-bar').style.width = '0%';
  }
 
  function removeFromQueue(audio) {
    const idx = queue.findIndex(e => e.audio === audio);
    if (idx !== -1) queue.splice(idx, 1);
  }
 
  function playTrack(track, seekTo) {
    /* seekTo: fracción 0–1 del punto de inicio (opcional) */
    const entry = audioMap.get(track);
    if (!entry) return;
    const { audio } = entry;
 
    if (queue.length >= MAX_SIMULTANEOUS) {
      const oldest = queue.shift();
      stopEntry(oldest);
    }
 
    if (audioCtx.state === 'suspended') audioCtx.resume();
    entry.connectToGraph();
 
    /* saltar al punto aleatorio si se especifica */
    if (seekTo !== undefined && audio.duration) {
      audio.currentTime = seekTo * audio.duration;
    }
 
    audio.loop = Math.random() < 0.5;
    track.classList.add('playing');
    audio.play().catch(() => {});
    queue.push({ audio, track });
  }
 
  allTracks.forEach(track => {
    const audio = new Audio(track.getAttribute('data-src'));
    audio.volume = VOLUME;
    /* precargar metadatos para conocer la duración */
    audio.preload = 'metadata';
 
    let connected = false;
    function connectToGraph() {
      if (connected) return;
      connected = true;
      const src = audioCtx.createMediaElementSource(audio);
      src.connect(analyser);
    }
 
    const bar = track.querySelector('.progress-bar');
 
    audio.addEventListener('timeupdate', () => {
      if (audio.duration)
        bar.style.width = ((audio.currentTime / audio.duration) * 100).toFixed(1) + '%';
    });
 
    audio.addEventListener('ended', () => {
      track.classList.remove('playing');
      bar.style.width = '0%';
      removeFromQueue(audio);
    });
 
    const entryObj = { audio, track, connectToGraph };
    audioMap.set(track, entryObj);
 
    function activate() {
      if (track.classList.contains('playing')) {
        audio.pause();
        audio.currentTime = 0;
        track.classList.remove('playing');
        bar.style.width = '0%';
        removeFromQueue(audio);
        return;
      }
      if (queue.length >= MAX_SIMULTANEOUS) {
        const oldest = queue.shift();
        stopEntry(oldest);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      connectToGraph();
      audio.loop = Math.random() < 0.5;
      track.classList.add('playing');
      audio.play().catch(() => {});
      queue.push({ audio, track });
    }
 
    track.addEventListener('click', activate);
    track.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); }
    });
  });
 
  /* ── Botón STOP ── */
  document.getElementById('btn-stop').addEventListener('click', () => {
    [...queue].forEach(entry => stopEntry(entry));
    queue.length = 0;
  });
 
  /* ── Botón PICNOLEPSIA ── */
  let picnoLocked = false;
 
  document.getElementById('btn-picno').addEventListener('click', () => {
    if (picnoLocked) return;
    picnoLocked = true;
 
    /* 1. Detener todo lo que suena */
    [...queue].forEach(entry => stopEntry(entry));
    queue.length = 0;
 
    /* 2. Reanudar contexto si estaba suspendido */
    const ctxReady = audioCtx.state === 'suspended'
      ? audioCtx.resume()
      : Promise.resolve();
 
    /* 3. Congelar el último fotograma del visualizador */
    if (window._picnoFreezeFrame) window._picnoFreezeFrame();
 
    /* 4. Ausencia: pantalla en negro 1 segundo */
    document.body.classList.add('absence');
 
    /* 5. Al cabo de 1 segundo: elegir 3 pistas aleatorias desde punto aleatorio */
    ctxReady.then(() => {
      setTimeout(() => {
        try {
          document.body.classList.remove('absence');
          if (window._picnoUnfreezeFrame) window._picnoUnfreezeFrame();
 
          const shuffled = [...allTracks]
            .map(t => ({ t, r: Math.random() }))
            .sort((a, b) => a.r - b.r)
            .map(x => x.t)
            .slice(0, 3);
 
          shuffled.forEach(track => {
            const { audio } = audioMap.get(track);
            const seekFraction = Math.random();
 
            function doPlay() {
              playTrack(track, seekFraction);
            }
 
            if (audio.duration) {
              doPlay();
            } else {
              audio.addEventListener('loadedmetadata', doPlay, { once: true });
              if (audio.readyState === 0) audio.load();
            }
          });
        } finally {
          /* siempre liberar el lock, pase lo que pase */
          picnoLocked = false;
        }
      }, 1000);
    }).catch(() => {
      /* si el resume falla, limpiar igual */
      document.body.classList.remove('absence');
      if (window._picnoUnfreezeFrame) window._picnoUnfreezeFrame();
      picnoLocked = false;
    });
  });
 
  /* ── Visualizador de onda real como fondo ── */
  const canvas  = document.getElementById('waveform');
  const ctx     = canvas.getContext('2d');
  const bufLen  = analyser.frequencyBinCount;
  const dataArr = new Uint8Array(bufLen);
 
  let frozen = false; // true durante la ausencia picnoléptica
 
  /* Congela el último fotograma capturando el canvas como imagen */
  function freezeFrame() {
    frozen = true;
    /* el canvas ya tiene el último frame pintado — simplemente dejamos de limpiar */
  }
 
  function unfreezeFrame() {
    frozen = false;
  }
 
  /* Exponer para que el botón picnolepsia pueda llamarlas */
  window._picnoFreezeFrame   = freezeFrame;
  window._picnoUnfreezeFrame = unfreezeFrame;
 
  function resize() {
    if (frozen) return; // no redimensionar mientras está congelado
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
 
  function drawWave() {
    requestAnimationFrame(drawWave);
    if (frozen) return; // mantener el último fotograma sin tocar
 
    analyser.getByteTimeDomainData(dataArr);
 
    const W = canvas.width;
    const H = canvas.height;
 
    ctx.clearRect(0, 0, W, H);
    ctx.lineWidth   = 1;
    ctx.strokeStyle = 'rgba(80, 80, 74, 0.9)';
    ctx.beginPath();
 
    const sliceW = W / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = dataArr[i] / 128.0;
      const y = (v * H) / 2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      x += sliceW;
    }
    ctx.stroke();
  }
 
  drawWave();
 
})();
</script>
 
</body>
</html>
