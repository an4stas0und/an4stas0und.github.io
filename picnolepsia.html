<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picnolepsia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      background: #000;
      font-family: 'Courier New', monospace;
      padding-bottom: 60px;
    }
 
    .track {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #111;
      padding: 0 20px;
      height: 52px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.08s;
      user-select: none;
    }
    .track:first-child { border-top: 1px solid #111; }
    .track:hover { background: #0d0d0d; }
    .track.playing { background: #0a0a0a; }
 
    .track-title {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.06em;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track.playing .track-title { color: #e8e8e0; }
 
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 1px;
      background: #333;
      width: 0%;
    }
    .track.playing .progress-bar { background: #555; }
 
    .indicator {
      position: absolute;
      right: 20px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: transparent;
    }
    .track.playing .indicator {
      background: #e8e8e0;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
 
    /* visualizador */
    #waveform {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100px;
      height: 100px;
      pointer-events: none;
    }
 
    /* botón stop */
    #btn-stop {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 60px;
      height: 60px;
      background: #000;
      border: none;
      border-left: 1px solid #111;
      border-top: 1px solid #111;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.08s;
    }
    #btn-stop:hover { background: #0d0d0d; }
    #btn-stop:active { background: #1a1a1a; }
    #btn-stop svg rect { fill: #444; transition: fill 0.08s; }
    #btn-stop:hover svg rect { fill: #e8e8e0; }
  </style>
</head>
<body>

<canvas id="waveform" width="100" height="100" aria-hidden="true"></canvas>
 
<button id="btn-stop" aria-label="Detener todo">
  <svg width="14" height="14" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="14" height="14"/>
  </svg>
</button>
 
<script>
(function () {
  const VOLUME = 0.708; // -3 dB
  const MAX_SIMULTANEOUS = 3;
  const queue = []; // { audio, track, source }
 
  /* ── AudioContext compartido ── */
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  analyser.smoothingTimeConstant = 0.8;
  analyser.connect(audioCtx.destination);
 
  function stopEntry(entry) {
    try { entry.audio.pause(); entry.audio.currentTime = 0; } catch(e) {}
    entry.track.classList.remove('playing');
    entry.track.querySelector('.progress-bar').style.width = '0%';
  }
 
  function removeFromQueue(audio) {
    const idx = queue.findIndex(e => e.audio === audio);
    if (idx !== -1) queue.splice(idx, 1);
  }
 
  document.querySelectorAll('.track').forEach(track => {
    const audio = new Audio(track.getAttribute('data-src'));
    audio.volume = VOLUME;
 
    /* Cada audio se conecta al analyser una sola vez */
    let connected = false;
    function connectToGraph() {
      if (connected) return;
      connected = true;
      const src = audioCtx.createMediaElementSource(audio);
      src.connect(analyser);
    }
 
    const bar = track.querySelector('.progress-bar');
 
    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        bar.style.width = ((audio.currentTime / audio.duration) * 100).toFixed(1) + '%';
      }
    });
 
    audio.addEventListener('ended', () => {
      track.classList.remove('playing');
      bar.style.width = '0%';
      removeFromQueue(audio);
    });
 
    function activate() {
      if (track.classList.contains('playing')) {
        audio.pause();
        audio.currentTime = 0;
        track.classList.remove('playing');
        bar.style.width = '0%';
        removeFromQueue(audio);
        return;
      }
 
      if (queue.length >= MAX_SIMULTANEOUS) {
        const oldest = queue.shift();
        stopEntry(oldest);
      }
 
      /* Reanudar contexto si fue suspendido por política de autoplay */
      if (audioCtx.state === 'suspended') audioCtx.resume();
 
      connectToGraph();
      track.classList.add('playing');
      audio.play().catch(() => {});
      queue.push({ audio, track });
    }
 
    track.addEventListener('click', activate);
    track.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); }
    });
  });
 
  /* ── Botón STOP ── */
  document.getElementById('btn-stop').addEventListener('click', () => {
    [...queue].forEach(entry => stopEntry(entry));
    queue.length = 0;
  });
 
  /* ── Visualizador de forma de onda real ── */
  const canvas  = document.getElementById('waveform');
  const ctx     = canvas.getContext('2d');
  const bufLen  = analyser.frequencyBinCount;
  const dataArr = new Uint8Array(bufLen);
 
  function drawWave() {
    requestAnimationFrame(drawWave);
    analyser.getByteTimeDomainData(dataArr);
 
    ctx.clearRect(0, 0, 100, 100);
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#444';
    ctx.beginPath();
 
    const sliceW = 100 / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = dataArr[i] / 128.0;
      const y = (v * 100) / 2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      x += sliceW;
    }
    ctx.stroke();
  }
 
  drawWave();
 
})();
</script>
 
</body>
</html>
